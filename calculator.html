<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markson's Sales Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0f;
  color: #e0e0e0;
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
}

/* ── Nav tabs ── */
nav {
  background: #0d0d1a;
  border-bottom: 1px solid #1e1e3a;
  display: flex;
  gap: 0;
  padding: 0 28px;
}
.nav-tab {
  display: inline-block;
  padding: 13px 22px;
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-decoration: none;
  color: #4b5563;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  margin-bottom: -1px;
}
.nav-tab:hover { color: #9ca3af; }
.nav-tab.active {
  color: #7b9fff;
  border-bottom-color: #7b9fff;
}

/* ── Header ── */
header {
  background: linear-gradient(135deg, #0d0d1a 0%, #12121f 100%);
  border-bottom: 1px solid #1e1e3a;
  padding: 18px 28px;
}
.header-title {
  font-family: 'Orbitron', monospace;
  font-size: 20px;
  font-weight: 700;
  color: #7b9fff;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.header-sub {
  font-size: 12px;
  color: #6b7280;
  margin-top: 3px;
}

/* ── Main layout ── */
.main {
  display: grid;
  grid-template-columns: 340px 1fr;
  gap: 28px;
  padding: 28px;
  max-width: 1100px;
  margin: 0 auto;
}
@media (max-width: 760px) {
  .main { grid-template-columns: 1fr; }
}

/* ── Input panel ── */
.panel {
  background: #0d0d1a;
  border: 1px solid #1e1e3a;
  border-radius: 8px;
  padding: 24px;
}
.panel-title {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #4b5563;
  margin-bottom: 20px;
}

.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 6px;
}
.input-wrap {
  position: relative;
}
.input-wrap .prefix {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #4b5563;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  pointer-events: none;
}
.input-wrap .suffix {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #4b5563;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  pointer-events: none;
}
input[type="number"] {
  width: 100%;
  background: #0f0f1e;
  border: 1px solid #1e2040;
  color: #c9d1e0;
  border-radius: 6px;
  padding: 9px 36px 9px 30px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
  -moz-appearance: textfield;
}
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
input[type="number"]:focus { border-color: #3d4fcc; }


.divider {
  border: none;
  border-top: 1px solid #1e1e3a;
  margin: 20px 0;
}

.total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.total-label {
  font-size: 12px;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 600;
}
.total-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  color: #9ca3af;
  font-weight: 500;
}
.total-value.grand {
  font-size: 22px;
  color: #e0e0e0;
  font-weight: 700;
}

.reset-btn {
  width: 100%;
  margin-top: 20px;
  padding: 10px;
  background: transparent;
  border: 1px solid #1e2040;
  border-radius: 6px;
  color: #4b5563;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.04em;
}
.reset-btn:hover {
  border-color: #3d4fcc;
  color: #9ca3af;
}

/* ── Results panel ── */
.results { display: flex; flex-direction: column; gap: 16px; }

.program-card {
  background: #0d0d1a;
  border: 1px solid #1e1e3a;
  border-radius: 8px;
  padding: 22px 24px;
  transition: border-color 0.2s;
}
.program-card.eligible { border-color: #1e3a1e; }
.program-card.ineligible { opacity: 0.45; }
.program-card.warning-card { border-color: #3a2a0a; }

.program-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
}
.program-name {
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: #7b9fff;
  line-height: 1.4;
}
.program-tag {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  white-space: nowrap;
}
.tag-eligible {
  background: #0f2a0f;
  color: #22c55e;
  border: 1px solid #16532a;
}
.tag-ineligible {
  background: #1a0f0f;
  color: #6b7280;
  border: 1px solid #2a1515;
}
.tag-warning {
  background: #2a1800;
  color: #f59e0b;
  border: 1px solid #4a2e00;
}

.program-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 12px;
}
.program-stat {
  background: #0a0a14;
  border: 1px solid #141428;
  border-radius: 6px;
  padding: 12px 14px;
}
.stat-label {
  font-size: 10px;
  color: #4b5563;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
  margin-bottom: 6px;
}
.stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 700;
  color: #e0e0e0;
  line-height: 1.2;
}
.stat-value.green { color: #22c55e; }
.stat-value.amber { color: #f59e0b; }
.stat-sub {
  font-size: 10px;
  color: #4b5563;
  margin-top: 3px;
  line-height: 1.4;
}

.warning-box {
  margin-top: 14px;
  background: #1a0e00;
  border: 1px solid #3a2200;
  border-radius: 6px;
  padding: 10px 14px;
  font-size: 11px;
  color: #d97706;
  line-height: 1.5;
}
.warning-box strong { color: #f59e0b; }

.ineligible-reason {
  margin-top: 12px;
  font-size: 11px;
  color: #4b5563;
}

/* ── Empty state ── */
.empty-state {
  background: #0d0d1a;
  border: 1px solid #1e1e3a;
  border-radius: 8px;
  padding: 60px;
  text-align: center;
  color: #2d3748;
  font-size: 14px;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #0a0a0f; }
::-webkit-scrollbar-thumb { background: #1e1e3a; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #2d2d50; }
</style>
</head>
<body>

<nav>
  <a class="nav-tab" href="index.html">Price Intelligence</a>
  <a class="nav-tab active" href="calculator.html">Sales Calculator</a>
</nav>

<header>
  <div class="header-title">Sales Calculator</div>
  <div class="header-sub">Financing program comparison for salespeople</div>
</header>

<div class="main">

  <!-- Left: inputs -->
  <div>
    <div class="panel">
      <div class="panel-title">Sale Breakdown</div>

      <div class="field">
        <label>Product Price</label>
        <div class="input-wrap">
          <span class="prefix">$</span>
          <input type="number" id="inProduct" min="0" step="0.01" placeholder="0.00" oninput="recalc()">
        </div>
      </div>

      <div class="field">
        <label>Delivery</label>
        <div class="input-wrap">
          <span class="prefix">$</span>
          <input type="number" id="inDelivery" min="0" step="0.01" placeholder="0.00" oninput="recalc()">
        </div>
      </div>

      <div class="field">
        <label>Protection Plan</label>
        <div class="input-wrap">
          <span class="prefix">$</span>
          <input type="number" id="inProtection" min="0" step="0.01" placeholder="0.00" oninput="recalc()">
        </div>
      </div>

      <div class="field">
        <label>Sales Tax Rate</label>
        <div style="font-family:'JetBrains Mono',monospace;font-size:14px;color:#c9d1e0;padding:9px 0 9px 2px;">8%</div>
      </div>

      <hr class="divider">

      <div class="total-row">
        <span class="total-label">Subtotal</span>
        <span class="total-value" id="outSubtotal">—</span>
      </div>
      <div class="total-row">
        <span class="total-label">Tax</span>
        <span class="total-value" id="outTax">—</span>
      </div>
      <div class="total-row" style="margin-top:10px;">
        <span class="total-label" style="color:#9ca3af;font-size:13px;">Total Financed</span>
        <span class="total-value grand" id="outTotal">—</span>
      </div>

      <button class="reset-btn" onclick="resetAll()">Clear All Fields</button>
    </div>
  </div>

  <!-- Right: financing programs -->
  <div class="results" id="results">
    <div class="empty-state" id="emptyState" style="display:none;"></div>
  </div>

</div>

<script>
const PROGRAMS = [
  {
    id: 'deferred12',
    name: '0% Deferred Interest — 12 Months',
    type: 'deferred',
    months: 12,
    minPurchase: 500,
    penaltyAPR: 29.99,
    provider: 'Nest Credit Card',
    warning: false,
  },
  {
    id: 'deferred36',
    name: '0% Deferred Interest — 36 Months',
    type: 'deferred',
    months: 36,
    minPurchase: 3000,
    penaltyAPR: 29.99,
    provider: 'Nest Credit Card',
    warning: false,
  },
  {
    id: 'koalifi',
    name: 'Koalifi Lease-to-Own',
    type: 'lto',
    months: 12,
    factor: 2.1,
    provider: 'Koalifi',
    warning: false,
  },
  {
    id: 'acima',
    name: 'Acima Lease-to-Own',
    type: 'lto',
    months: 12,
    factor: 2.1,
    provider: 'Acima',
    warning: false,
  },
];

function fmt(n) {
  if (n === null || isNaN(n)) return '—';
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtBig(n) {
  if (n === null || isNaN(n)) return '—';
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function val(id) {
  const v = parseFloat(document.getElementById(id).value);
  return isNaN(v) || v < 0 ? 0 : v;
}

function recalc() {
  const product    = val('inProduct');
  const delivery   = val('inDelivery');
  const protection = val('inProtection');
  const taxRate    = 8;

  const subtotal = product + delivery + protection;
  const taxAmount = subtotal * (taxRate / 100);
  const total = subtotal + taxAmount;

  // Update summary
  document.getElementById('outSubtotal').textContent = subtotal > 0 ? fmt(subtotal) : '—';
  document.getElementById('outTax').textContent = subtotal > 0 ? fmt(taxAmount) : '—';
  document.getElementById('outTotal').textContent = total > 0 ? fmt(total) : '—';

  // Render programs
  const results = document.getElementById('results');
  const empty = document.getElementById('emptyState');

  if (total <= 0) {
    [...results.querySelectorAll('.program-card')].forEach(el => el.remove());
    return;
  }

  PROGRAMS.forEach(prog => {
    let card = document.getElementById('card-' + prog.id);
    if (!card) {
      card = document.createElement('div');
      card.id = 'card-' + prog.id;
      card.className = 'program-card';
      results.appendChild(card);
    }
    renderCard(card, prog, total);
  });
}

function renderCard(card, prog, total) {
  let eligible = true;
  let ineligibleReason = '';

  if (prog.type === 'deferred' && total < prog.minPurchase) {
    eligible = false;
    ineligibleReason = `Minimum purchase of ${fmt(prog.minPurchase)} required. Current total is ${fmt(total)}.`;
  }

  // Build card classes
  card.className = 'program-card' + (eligible ? (prog.warning ? ' warning-card' : ' eligible') : ' ineligible');

  let statsHtml = '';

  if (eligible) {
    if (prog.type === 'deferred') {
      const monthly = total / prog.months;
      statsHtml = `
        <div class="program-grid">
          <div class="program-stat">
            <div class="stat-label">Total Financed</div>
            <div class="stat-value green">${fmtBig(total)}</div>
            <div class="stat-sub">0% interest if paid in full</div>
          </div>
          <div class="program-stat">
            <div class="stat-label">Monthly Payment</div>
            <div class="stat-value">${fmtBig(monthly)}</div>
            <div class="stat-sub">over ${prog.months} months</div>
          </div>
          <div class="program-stat">
            <div class="stat-label">Penalty APR</div>
            <div class="stat-value amber">${prog.penaltyAPR}%</div>
            <div class="stat-sub">if not paid off in time</div>
          </div>
        </div>`;
    } else if (prog.type === 'lto') {
      const totalCost = total * prog.factor;
      const biweekly = totalCost / 26;
      const costOver = totalCost - total;
      const costPct = ((prog.factor - 1) * 100).toFixed(0);
      statsHtml = `
        <div class="program-grid">
          <div class="program-stat">
            <div class="stat-label">Biweekly Payment</div>
            <div class="stat-value green">${fmtBig(biweekly)}</div>
            <div class="stat-sub">26 payments / year</div>
          </div>
          <div class="program-stat">
            <div class="stat-label">Total Cost</div>
            <div class="stat-value">${fmtBig(totalCost)}</div>
            <div class="stat-sub">${prog.factor}× factor · ${prog.months} months</div>
          </div>
          <div class="program-stat">
            <div class="stat-label">Cost of Lease</div>
            <div class="stat-value amber">${fmtBig(costOver)}</div>
            <div class="stat-sub">${costPct}% over cash price</div>
          </div>
        </div>`;
    }
  }

  const tagHtml = eligible
    ? (prog.warning
        ? `<span class="program-tag tag-warning">⚠ Conditions Apply</span>`
        : `<span class="program-tag tag-eligible">✓ Eligible</span>`)
    : `<span class="program-tag tag-ineligible">Not Eligible</span>`;

  card.innerHTML = `
    <div class="program-header">
      <div>
        <div class="program-name">${prog.name}</div>
        <div style="font-size:10px;color:#4b5563;margin-top:3px;">${prog.provider}</div>
      </div>
      ${tagHtml}
    </div>
    ${eligible ? statsHtml : `<div class="ineligible-reason">${ineligibleReason}</div>`}
  `;
}

function resetAll() {
  ['inProduct','inDelivery','inProtection'].forEach(id => {
    document.getElementById(id).value = '';
  });
  recalc();
}
</script>
</body>
</html>
