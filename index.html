body {

.table-wrap { overflow-x: auto; padding: 0 0 40px 0; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead {

thead tr { border-bottom: 2px solid #1e1e3a; }
th {

tr:hover td { background: #0e0e1e; }

.item-sku {

let sortCol = 'description', sortDir = 1, filterCat = '', filterSearch = '';

function marksonClass(item) {
  if (item.markson == null) return '';
  const comps = [item.ob, item.db, item.ashley].filter(v => v != null);
  if (!comps.length) return '';
  return item.markson <= Math.min(...comps) ? 'markson-lowest' : 'markson-not-lowest';
}

function fmtPrice(val, cls) {
  if (val == null) return '<span class="null-price">—</span>';
  return '<span class="' + (cls || 'price') + '">$' + Number(val).toFixed(2) + '</span>';
}

function renderRows(data) {
  const tbody = document.getElementById('tableBody');
  const noRes = document.getElementById('noResults');
  if (!data.length) { tbody.innerHTML = ''; noRes.style.display = 'block'; return; }
  noRes.style.display = 'none';
  tbody.innerHTML = data.map(item => {
    const mc = marksonClass(item);
    return '<tr>' +
      '<td><div class="item-desc">' + item.description + '</div><div class="item-sku">' + item.sku + '</div></td>' +
      '<td><span class="cat-badge">' + item.category + '</span></td>' +
      '<td>' + fmtPrice(item.markson, mc || 'price') + '</td>' +
      '<td>' + fmtPrice(item.ob) + '</td>' +
      '<td>' + fmtPrice(item.db) + '</td>' +
      '<td>' + fmtPrice(item.ashley) + '</td>' +
      '</tr>';
  }).join('');
}

function applyFilters() {
  filterSearch = document.getElementById('searchBox').value.toLowerCase();
  filterCat = document.getElementById('catFilter').value;
  let data = ITEMS.filter(item => {
    if (filterCat && item.category !== filterCat) return false;
    if (filterSearch && !item.description.toLowerCase().includes(filterSearch) && !item.sku.toLowerCase().includes(filterSearch)) return false;
    return true;
  });
  data.sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (av == null) av = sortDir === 1 ? Infinity : -Infinity;
    if (bv == null) bv = sortDir === 1 ? Infinity : -Infinity;
    if (typeof av === 'string') return sortDir * av.localeCompare(bv);
    return sortDir * (av - bv);
  });
  renderRows(data);
  ['description','category','markson','ob','db','ashley'].forEach(col => {
    const th = document.getElementById('th-' + col);
    if (!th) return;
    th.classList.toggle('sorted', col === sortCol);
    th.querySelector('.sort-arrow').textContent = col === sortCol ? (sortDir === 1 ? '↑' : '↓') : '⇕';
  });
}

function sortBy(col) {
  sortDir = sortCol === col ? sortDir * -1 : 1;
  sortCol = col;
  applyFilters();
}

applyFilters();
